<!DOCTYPE html>
<html>
<head>
  <title>Test Telegram</title>
</head>
<body>
<button onclick="send()">Send Test</button>
<script src="config/email.js"></script>
<script>
  async function send() {
    const url = `https://api.telegram.org/bot${CONFIG.apikey}/sendMessage`;
    const response = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: CONFIG.chatid, text: "Test from browser!" })
    });
    const result = await response.json();
    console.log(result);
    alert(JSON.stringify(result, null, 2));
  }
</script>
</body>
</html>
